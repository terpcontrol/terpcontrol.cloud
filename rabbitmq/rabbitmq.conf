auth_backends.1 = http
auth_backends.2 = internal
auth_http.http_method   = post
auth_http.user_path     = http://server:8081/mqttauth/@MQTTAUTH_SHARED_SECRET@/user
auth_http.vhost_path    = http://server:8081/mqttauth/@MQTTAUTH_SHARED_SECRET@/vhost
auth_http.resource_path = http://server:8081/mqttauth/@MQTTAUTH_SHARED_SECRET@/resource
auth_http.topic_path    = http://server:8081/mqttauth/@MQTTAUTH_SHARED_SECRET@/topic
mqtt.allow_anonymous = false

# Plaintext MQTT for legacy firmware that cannot speak TLS. This listener always
# stays available; the TLS listener on 8883 is added at startup when certs are present.
mqtt.listeners.tcp.default = 1883

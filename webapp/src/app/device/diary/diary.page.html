<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{'diary.title' | translate}}</ion-title>
    <ion-buttons slot="end" *ngIf="canEdit">
      <ion-button (click)="openShareModal()" [title]="'share.button' | translate">
        <ion-icon slot="icon-only" name="share-social-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <!-- The reports only render once access info resolved, so view-only links
       start from the stored view instead of tamperable URL parameters. -->
  <ng-container *ngIf="resolved">
    <ion-card>
      <ion-card-content>
        <ion-button *ngIf="canEdit" color="primary" (click)="openEntryModal()">
          <ion-icon name="add-circle-outline"></ion-icon>&nbsp;
          {{'diary.addEntry' | translate}}
        </ion-button>

        <ion-select
          [(ngModel)]="selectedReport"
          [interfaceOptions]="{'cssClass': 'wider-popover'}"
          (ngModelChange)="reportSelected()"
          [disabled]="locked"
          class="ion-float-right"
        >
          <ion-select-option value="entries">{{ 'diary.entriesReport' | translate}}</ion-select-option>
          <ion-select-option value="growreport">{{ 'diary.growReport' | translate}}</ion-select-option>
          <ion-select-option value="co2report">{{ 'diary.co2Report' | translate}}</ion-select-option>
        </ion-select>
      </ion-card-content>
    </ion-card>

    <app-co2-report
      *ngIf="selectedReport === 'co2report'"
      [deviceId]="deviceId"
      [cloudSettings]="cloudSettings"
      [lastUpdated]="lastUpdated"
    ></app-co2-report>

    <app-grow-report
      *ngIf="selectedReport === 'growreport'"
      [deviceId]="deviceId"
      [isPublic]="isPublic"
      [locked]="locked"
      [lockedParams]="lockedParams"
      [webcamAllowed]="webcamAllowed"
      [lastUpdated]="lastUpdated"
    ></app-grow-report>

    <app-diary-entries-report
      *ngIf="selectedReport === 'entries'"
      [deviceId]="deviceId"
      [readOnly]="!canEdit"
      [locked]="locked"
      [lockedParams]="lockedParams"
      [lastUpdated]="lastUpdated"
    ></app-diary-entries-report>
  </ng-container>
</ion-content>
